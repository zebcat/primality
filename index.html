<input type="text" id="userInput" placeholder="Insert a number.">
<pre id="output"></pre>

<script>
    var PrintThis="";
    const inputElement = document.getElementById("userInput");
    inputElement.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            const submittedText = inputElement.value;
            var PrintThis="";
            Print(submittedText);
            Print(67);
            inputElement.value="";
        }
    });

    function Print(text) {
        PrintThis+="\n"+text;
        document.getElementById("output").textContent = PrintThis;
    }

</script>
