<input type="text" id="userInput" placeholder="Type something and press Enter...">
<p id="output"></p>

<script>
    const inputElement = document.getElementById("userInput");
    inputElement.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            const submittedText = inputElement.value;
            Perform(submittedText);
            inputElement.value = "";
        }
    });

    // This is the custom function that runs after pressing Enter
    function Perform(text) {
        document.getElementById("output").textContent = "You submitted: " + text;
    }
</script>
